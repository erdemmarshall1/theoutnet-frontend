<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <link id="linkicon" rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes,viewport-fit=cover" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>THE OUTNET WHOLESALE | Luxury Fashion Marketplace</title>
  <style>
    body { margin: 0; background: #ffffff; }
    .app-loading-box {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translateX(-50%) translateY(-50%);
    }
    .app-loading-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #000;
    }
    .app-loading-logo {
      margin-bottom: 32px;
    }
    .app-loading-logo svg {
      width: 200px;
      height: auto;
    }
    .app-loading-app-dot-loading {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 4px;
    }
    .app-dot-loading-item {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 4px;
      background-color: #000;
      border-radius: 50%;
      animation: ton-loading 1.4s ease-in-out infinite both;
    }
    .app-dot-loading-item:nth-child(1) { left: 0; animation-delay: 0s; }
    .app-dot-loading-item:nth-child(2) { left: 12px; animation-delay: 0.16s; }
    .app-dot-loading-item:nth-child(3) { left: 24px; animation-delay: 0.32s; }
    .app-dot-loading-item:nth-child(4) { left: 36px; animation-delay: 0.48s; }
    @keyframes ton-loading {
      0%, 80%, 100% { opacity: 0.15; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.3); }
    }
    .app-loading-text {
      margin-top: 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="app-loading" class="app-loading-box">
    <div class="app-loading-container">
      <div class="app-loading-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 276 25" fill="#000">

        </svg>
      </div>
      <div class="app-loading-space-item">
        <div class="app-loading-app-dot-loading">
          <div class="app-dot-loading-item"></div>

          <div class="app-dot-loading-item"></div>
          <div class="app-dot-loading-item"></div>
        </div>
      </div>
      <div class="app-loading-text">Loading</div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
