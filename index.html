<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <link id="linkicon" rel="icon" href="/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes,viewport-fit=cover" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Shopify Wholesale</title>
  <link rel="stylesheet" href="//at.alicdn.com/t/c/font_4183144_ri9epcz8z6i.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap">
  <style>
    @keyframes app-dot-loading {
      0% { transform: translate3D(-48.621%, 0, -0.985px) scale(.511); }
      2.778% { transform: translate3D(-95.766%, 0, -0.94px) scale(.545); }
      5.556% { transform: translate3D(-140%, 0, -0.866px) scale(.6); }
      8.333% { transform: translate3D(-179.981%, 0, -0.766px) scale(.675); }
      11.111% { transform: translate3D(-214.492%, 0, -0.643px) scale(.768); }
      13.889% { transform: translate3D(-242.487%, 0, -0.5px) scale(.875); }
      16.667% { transform: translate3D(-263.114%, 0, -0.342px) scale(.993); }
      19.444% { transform: translate3D(-275.746%, 0, -0.174px) scale(1.12); }
      22.222% { transform: translate3D(-280%, 0, 0) scale(1.25); }
      25% { transform: translate3D(-275.746%, 0, 0.174px) scale(1.38); }
      27.778% { transform: translate3D(-263.114%, 0, 0.342px) scale(1.507); }
      30.556% { transform: translate3D(-242.487%, 0, 0.5px) scale(1.625); }
      33.333% { transform: translate3D(-214.492%, 0, 0.643px) scale(1.732); }
      36.111% { transform: translate3D(-179.981%, 0, 0.766px) scale(1.825); }
      38.889% { transform: translate3D(-140%, 0, 0.866px) scale(1.9); }
      41.667% { transform: translate3D(-95.766%, 0, 0.94px) scale(1.955); }
      44.444% { transform: translate3D(-48.621%, 0, 0.985px) scale(1.989); }
      47.222% { transform: translateZ(1px) scale(2); }
      50% { transform: translate3D(48.621%, 0, 0.985px) scale(1.989); }
      52.778% { transform: translate3D(95.766%, 0, 0.94px) scale(1.955); }
      55.556% { transform: translate3D(140%, 0, 0.866px) scale(1.9); }
      58.333% { transform: translate3D(179.981%, 0, 0.766px) scale(1.825); }
      61.111% { transform: translate3D(214.492%, 0, 0.643px) scale(1.732); }
      63.889% { transform: translate3D(242.487%, 0, 0.5px) scale(1.625); }
      66.667% { transform: translate3D(263.114%, 0, 0.342px) scale(1.507); }
      69.444% { transform: translate3D(275.746%, 0, 0.174px) scale(1.38); }
      72.222% { transform: translate3D(280%, 0, 0) scale(1.25); }
      75% { transform: translate3D(275.746%, 0, -0.174px) scale(1.12); }
      77.778% { transform: translate3D(263.114%, 0, -0.342px) scale(.993); }
      80.556% { transform: translate3D(242.487%, 0, -0.5px) scale(.875); }
      83.333% { transform: translate3D(214.492%, 0, -0.643px) scale(.768); }
      86.111% { transform: translate3D(179.981%, 0, -0.766px) scale(.675); }
      88.889% { transform: translate3D(140%, 0, -0.866px) scale(.6); }
      91.667% { transform: translate3D(95.766%, 0, -0.94px) scale(.545); }
      94.444% { transform: translate3D(48.621%, 0, -0.985px) scale(.511); }
      97.222% { transform: translateZ(-1px) scale(.5); }
    }
    .app-loading-box {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translateX(-50%) translateY(-50%);
    }
    .app-loading-container {
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #1d2129;
    }
    .app-loading-logo {
      margin-bottom: 24px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #e1e5ec;
    }
    .app-loading-logo img {
      width: 100px;
      height: 100px;
    }
    .app-loading-space-item { margin-bottom: 24px; }
    .app-loading-app-spin { display: block; }
    .app-loading-app-spin-icon { color: #aaa; font-size: 20px; }
    .app-loading-app-dot-loading {
      position: relative;
      display: inline-block;
      width: 56px;
      height: 8px;
      transform-style: preserve-3d;
      perspective: 200px;
    }
    .app-dot-loading-item {
      position: absolute;
      top: 0;
      left: 50%;
      width: 8px;
      height: 8px;
      background-color: rgb(22,93,255);
      border-radius: 50%;
      transform: translate(-50%) scale(0);
      animation: app-dot-loading 2s cubic-bezier(0, 0, 1, 1) infinite forwards;
    }
    .app-dot-loading-item:nth-of-type(1) { background-color: rgb(22,93,255); }
    .app-dot-loading-item:nth-of-type(2) { background-color: rgb(64,128,255); animation-delay: .4s; }
    .app-dot-loading-item:nth-of-type(3) { background-color: rgb(106,161,255); animation-delay: .8s; }
    .app-dot-loading-item:nth-of-type(4) { background-color: rgb(106,161,255); animation-delay: 1.2s; }
    .app-dot-loading-item:nth-of-type(5) { background-color: rgb(190,218,255); animation-delay: 1.6s; }
    .app-loading-text { opacity: 0.5; line-height: 1.2; }
  </style>
</head>
<body>
  <div id="app-loading" class="app-loading-box">
    <div class="app-loading-container">
      <div class="app-loading-logo">
        <img src="/favicon.png" alt="Shopify Wholesale">
      </div>
      <div class="app-loading-space-item">
        <div class="app-loading-app-spin">
          <div class="app-loading-app-spin-icon">
            <div class="app-loading-app-dot-loading">
              <div class="app-dot-loading-item"></div>
              <div class="app-dot-loading-item"></div>
              <div class="app-dot-loading-item"></div>
              <div class="app-dot-loading-item"></div>
              <div class="app-dot-loading-item"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="app-loading-text">
        <span>Loading...</span>
      </div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
